<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目索引</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;background:#fbfaf5;color:#23271d;line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.wrap{max-width:680px;width:100%}
h1{font-size:26px;font-weight:900;color:#1C7A36;margin-bottom:8px}
.sub{font-size:15px;color:#666;margin-bottom:32px}
.card{display:block;text-decoration:none;background:#fff;border:1px solid #e2e0d4;border-radius:14px;padding:22px 26px;margin-bottom:16px;transition:border-color .2s,transform .15s}
.card:hover{border-color:#2BA84A;transform:translateY(-2px)}
.card .t{font-size:18px;font-weight:900;color:#27500A;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.card .badge{font-size:12px;font-weight:700;color:#fff;background:#F26B33;border-radius:6px;padding:2px 10px}
.card .d{font-size:14px;color:#555}
.card .arrow{color:#2BA84A;font-weight:900}
.foot{margin-top:24px;font-size:12px;color:#999;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>项目索引</h1>
  <p class="sub">Project Index</p>

  <a class="card" href="ye-zai-yiqi/">
    <div class="t">野在一起 On the Trail <span class="badge">招商方案</span></div>
    <div class="d">腾讯广告 × PatRun 家庭户外营销 IP 整合营销招商方案 <span class="arrow">→</span></div>
  </a>

  <div class="foot">© 2026 · 内部沟通材料，仅供合作洽谈使用</div>
</div>
</body>
</html>
